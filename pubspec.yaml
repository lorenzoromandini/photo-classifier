name: photo_classifier
description: Automatically organize your photos using on-device ML
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Database
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # File Operations
  file_picker: ^6.1.1
  permission_handler: ^11.3.0
  path_provider: ^2.1.2
  
  # ML Kit
  google_mlkit_image_labeling: ^0.14.2
  
  # UI
  cupertino_icons: ^1.0.6
  
  # Background
  workmanager: ^0.5.2
  
  # Notifications
  flutter_local_notifications: ^17.2.1
  
  # Preferences
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.10
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
